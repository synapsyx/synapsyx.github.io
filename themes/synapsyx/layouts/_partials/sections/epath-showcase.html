<section id="epath" class="epath-showcase py-5">
  <div class="container">
    <!-- Headline -->
    <div class="row justify-content-center mb-4">
      <div class="col-lg-8 text-center">
        <h2 class="section-title">{{ .Params.title }}</h2>
        <div class="section-divider"></div>
        <h3 class="section-subtitle">{{ .Params.subtitle }}</h3>
      </div>
    </div>

    <!-- Description -->
    <div class="row justify-content-center mb-5">
      <div class="col-lg-10">
        <div class="blur-box epath-description">
          {{ .Content | safeHTML }}
        </div>
      </div>
    </div>

    <!-- Screenshot Gallery -->
    <div class="row justify-content-center">
      <div class="col-lg-12">
        <div class="epath-gallery">
          {{ range .Params.screenshots }}
            <div class="epath-screenshot-item">
              {{ $img := resources.Get .image | fingerprint }}
              <img src="{{ $img.RelPermalink }}" alt="{{ .caption }}" class="img-fluid" loading="lazy">
              <p class="epath-caption">{{ .caption }}</p>
            </div>
          {{ end }}
        </div>
      </div>
    </div>
  </div>
</section>
